<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My One Page Website</title>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <a href="#home">Home</a> |
        <a href="#gallery">Gallery</a> |
        <a href="#contact">Contact</a> |
        <a href="#video">Video</a>
    </nav>

    <!-- Home Section -->
    <section id="home">
        <h1>Welcome to My One Page Website</h1>
        <p>This is my one-page website created for my HTML assignment.</p>
    </section>

    <!-- Gallery / Images Section -->
    <section id="gallery">
        <h2>Gallery</h2>
        <img src="https://via.placeholder.com/200" alt="Sample Image 1">
        <img src="https://via.placeholder.com/200" alt="Sample Image 2">
        <img src="https://via.placeholder.com/200" alt="Sample Image 3">
    </section>

    <!-- Contact Form Section -->
    <section id="contact">
        <h2>Contact Me</h2>
        <form>
            <label>Name:</label><br>
            <input type="text" name="name"><br><br>

            <label>Email:</label><br>
            <input type="email" name="email"><br><br>

            <label>Message:</label><br>
            <textarea name="message"></textarea><br><br>

            <button type="submit">Submit</button>
        </form>
    </section>

    <!-- Video Section -->
    <section id="video">
        <h2>My Video</h2>
        <iframe width="400" height="250" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Sample Video"></iframe>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2024 My One Page Website</p>
    </footer>

</body>
</html>
